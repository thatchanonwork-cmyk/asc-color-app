<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ASC Annual Meeting - เช็คกลุ่มสี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== SCG font =====
     วางไฟล์ SCG-Light.woff2 / SCG-Regular.woff2 / SCG-Bold.woff2
     ไว้ที่ /public/fonts/ แล้วหน้าเว็บนี้จะใช้ฟอนต์ SCG จริงทันที
     (ระหว่างที่ยังไม่มีไฟล์ ตัว browser จะ fallback ไปที่ Kanit ให้อัตโนมัติ) */
  @font-face {
    font-family: 'SCG';
    src: url('fonts/SCG-Light.woff2') format('woff2'),
         url('fonts/SCG-Light.woff') format('woff');
    font-weight: 300;
    font-display: swap;
  }
  @font-face {
    font-family: 'SCG';
    src: url('fonts/SCG-Regular.woff2') format('woff2'),
         url('fonts/SCG-Regular.woff') format('woff');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'SCG';
    src: url('fonts/SCG-Bold.woff2') format('woff2'),
         url('fonts/SCG-Bold.woff') format('woff');
    font-weight: 600 700;
    font-display: swap;
  }

  :root {
    --ink: #4a3f55;
    --muted: #a79bb0;
    --line: #f0e6f5;
    --bg1: #fff0f5;
    --bg2: #eef2ff;
    --accent: #ff8fab;
    --accent-dark: #ff6f91;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
  }
  body {
    font-family: 'SCG', 'Kanit', 'Noto Sans Thai', 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, #fdf6ff 45%, var(--bg2) 100%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* soft decorative blobs, kept subtle so layout stays minimal */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0.55;
    z-index: 0;
  }
  body::before {
    width: 260px; height: 260px;
    background: #ffd9e6;
    top: -80px; left: -80px;
  }
  body::after {
    width: 220px; height: 220px;
    background: #dcefff;
    bottom: -70px; right: -70px;
  }

  .stage {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 26px;
  }
  .header .eyebrow {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-dark);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin: 0;
    color: var(--ink);
  }

  /* -------- form -------- */
  .form-card {
    width: 100%;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 36px 28px;
    box-shadow: 0 12px 30px -10px rgba(255, 143, 171, 0.25);
  }
  .form-card label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 400;
  }
  .form-card input {
    width: 100%;
    padding: 14px 16px;
    font-size: 18px;
    font-family: inherit;
    border: 2px solid var(--line);
    background: #fffafc;
    border-radius: 14px;
    outline: none;
    letter-spacing: 0.5px;
    text-align: center;
    transition: border-color .15s ease;
  }
  .form-card input:focus { border-color: var(--accent); }
  .form-card button {
    width: 100%;
    margin-top: 16px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: linear-gradient(135deg, #ff9bb5, #ff7aa0);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 20px -6px rgba(255, 122, 160, 0.55);
    transition: transform .15s ease, opacity .15s ease;
  }
  .form-card button:hover { transform: translateY(-1px); }
  .form-card button:disabled { opacity: 0.5; }
  .error-msg {
    color: #e0577a;
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
  }

  /* -------- result -------- */
  #resultView { width: 100%; }

  .result-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 26px;
    color: #fff;
    box-shadow: 0 8px 20px -8px rgba(0,0,0,0.2);
  }
  .result-title {
    text-align: center;
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 24px;
    color: var(--ink);
  }

  .ticket {
    width: 100%;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 12px 30px -10px rgba(255, 143, 171, 0.2);
  }
  .ticket-body { padding: 26px 26px 6px; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    font-size: 13.5px;
    border-bottom: 1px dashed var(--line);
  }
  .row:last-child { border-bottom: none; }
  .row .label { color: var(--muted); font-weight: 300; }
  .row .value { color: var(--ink); font-weight: 600; text-align: right; }
  .color-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 999px;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
  }
  .banner {
    padding: 22px 24px;
    text-align: center;
    color: #fff;
  }
  .banner .big-color {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .banner .sub {
    font-size: 12.5px;
    opacity: 0.95;
    font-weight: 300;
  }

  .reminder {
    width: 100%;
    background: #fffdf5;
    border: 1.5px dashed #ffd98e;
    border-radius: 18px;
    padding: 16px 18px;
    margin-top: 14px;
    font-size: 13px;
    color: #a3801f;
    text-align: center;
    line-height: 1.6;
    font-weight: 400;
  }
  .reminder b { color: #8a6600; font-weight: 600; }

  .again-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    color: var(--muted);
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
  }

  .footer-note {
    text-align: center;
    color: #cbb8d6;
    font-size: 11px;
    margin-top: 28px;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="stage">

  <div class="header">
    <div class="eyebrow">✨ ASC Annual Meeting</div>
    <h1>ตรวจสอบกลุ่มสีของคุณ</h1>
  </div>

  <div id="formView" class="form-card">
    <label for="empId">กรอกรหัสพนักงาน</label>
    <input id="empId" type="text" inputmode="numeric" placeholder="800XXXXX" autocomplete="off" />
    <button id="submitBtn" onclick="lookup()">ตรวจสอบกลุ่มสี</button>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>
  </div>

  <div id="resultView" style="display:none;">
    <div class="result-icon" id="resultCircle">✓</div>
    <p class="result-title" id="resultTitle">ตรวจสอบสำเร็จ</p>

    <div class="ticket">
      <div class="ticket-body">
        <div class="row"><span class="label">รหัสพนักงาน</span><span class="value" id="rEmpId"></span></div>
        <div class="row"><span class="label">ชื่อ-นามสกุล</span><span class="value" id="rName"></span></div>
        <div class="row"><span class="label">ตำแหน่ง</span><span class="value" id="rPosition"></span></div>
        <div class="row"><span class="label">สาขา/หน่วยงาน</span><span class="value" id="rStore"></span></div>
        <div class="row"><span class="label">ทีม</span><span class="value" id="rTeam"></span></div>
        <div class="row"><span class="label">กลุ่มสี</span><span class="value"><span class="color-badge" id="rColorBadge"></span></span></div>
      </div>
      <div class="banner" id="banner">
        <div class="big-color" id="bannerColor">สีแดง</div>
        <div class="sub">แสดงหน้าจอนี้กับทีมงานเพื่อรับของ 🎁</div>
      </div>
    </div>

    <div class="reminder">
      📸 <b>อย่าลืมแคปหน้าจอนี้ไว้</b><br/>
      เพื่อนำมายืนยันรับของที่ระลึกประจำกลุ่มสีกับทีมงาน
    </div>

    <button class="again-btn" onclick="resetView()">ตรวจสอบรหัสอื่น</button>
  </div>

  <div class="footer-note">ASC Annual Meeting © 2026</div>
</div>

<script>
const COLOR_MAP = {
  'แดง':   { hex: '#f2665f', name: 'สีแดง' },
  'เหลือง': { hex: '#ffc93c', name: 'สีเหลือง' },
  'เขียว':  { hex: '#4ecb71', name: 'สีเขียว' },
  'ฟ้า':    { hex: '#4fc3f7', name: 'สีฟ้า' },
  'ชมพู':  { hex: '#ff8ac0', name: 'สีชมพู' },
  'ม่วง':  { hex: '#a78bfa', name: 'สีม่วง' },
};

async function lookup() {
  const empId = document.getElementById('empId').value.trim();
  const errorEl = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');
  errorEl.style.display = 'none';

  if (!empId) {
    errorEl.textContent = 'กรุณากรอกรหัสพนักงาน';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังตรวจสอบ...';

  try {
    const res = await fetch('/api/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ empId }),
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
      errorEl.style.display = 'block';
      return;
    }

    showResult(data);
  } catch (e) {
    errorEl.textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่อีกครั้ง';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ตรวจสอบกลุ่มสี';
  }
}

function showResult(data) {
  const c = COLOR_MAP[data.color] || { hex: '#999', name: data.color };

  document.getElementById('rEmpId').textContent = data.empId;
  document.getElementById('rName').textContent = data.fullName;
  document.getElementById('rPosition').textContent = data.position || '-';
  document.getElementById('rStore').textContent = data.store || '-';
  document.getElementById('rTeam').textContent = data.team;

  const badge = document.getElementById('rColorBadge');
  badge.textContent = c.name;
  badge.style.background = c.hex;

  document.getElementById('banner').style.background = c.hex;
  document.getElementById('bannerColor').textContent = c.name;

  document.getElementById('resultCircle').style.background = c.hex;
  document.getElementById('resultTitle').textContent = data.firstCheckin ? 'ยืนยันกลุ่มสีสำเร็จ' : 'คุณเช็คอินไปแล้ว';

  document.getElementById('formView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
}

function resetView() {
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('formView').style.display = 'block';
  document.getElementById('empId').value = '';
  document.getElementById('empId').focus();
}

document.getElementById('empId').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') lookup();
});
</script>
</body>
</html>
